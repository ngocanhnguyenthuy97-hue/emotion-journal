
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>☁️ Nhật Ký Cảm Xúc (Firebase)</title>

    <style>
        /* ================= GLOBAL ================= */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #444;
        }

        h1,
        h2,
        h3 {
            margin-top: 0;
            color: #5a4b81;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            background: #a9def9;
            color: #333;
            transition: transform 0.1s, background 0.2s;
        }

        button:hover {
            background: #d0f4de;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        input,
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 100%;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            margin: 20px auto;
            max-width: 600px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        /* ================= AUTH ================= */
        #auth-container {
            max-width: 400px;
        }

        /* ================= EMOTIONS ================= */
        .emotions-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .emoji-btn {
            font-size: 2.5rem;
            background: #f0f0f0;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            border: 3px solid transparent;
        }

        .emoji-btn:hover {
            transform: scale(1.1);
            background: #fff;
        }

        .emoji-btn.selected {
            background: #ffe5d9;
            border-color: #ffcad4;
            transform: scale(1.2);
        }

        /* ================= RANGE SLIDER ================= */
        .range-wrap {
            margin: 20px 0;
        }

        input[type=range] {
            width: 100%;
        }

        /* ================= CALENDAR ================= */
        #calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .day-cell {
            background: #fff;
            border-radius: 10px;
            padding: 8px;
            min-height: 50px;
            font-size: 0.9rem;
            position: relative;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .day-cell img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-top: 4px;
            display: block;
        }

        .day-cell .emotion-icon {
            font-size: 1.2rem;
        }

        /* ================= BREATHING ================= */
        #breathing-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #bde0fe;
            margin: 50px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 4s ease-in-out, background-color 4s ease;
            color: #555;
            position: relative;
        }

        .inhale {
            transform: scale(1.5);
            background-color: #ffc8dd !important;
        }

        .hold {
            transform: scale(1.5);
            background-color: #cdb4db !important;
        }

        /* Big hold */
        .exhale {
            transform: scale(1.0);
            background-color: #bde0fe !important;
        }

        .hold-empty {
            transform: scale(1.0);
            background-color: #a2d2ff !important;
        }

        /* Small hold */

        #timer-display {
            font-size: 2rem;
            margin-top: 10px;
            font-weight: bold;
            color: #ffafcc;
        }

        /* ================= LOADER ================= */
        #loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
        /* ================= ENTRY ITEM (hover mới hiện nút xóa) ================= */

.entry-item {
    position: relative;
    font-size: 0.75rem;
    margin-top: 4px;
    padding: 6px;
    background: white;
    border-radius: 6px;
}

/* Ẩn nút X */
.entry-item button {
    position: absolute;
    top: 2px;
    right: 2px;
    background: transparent;
    border: none;
    cursor: pointer;
    opacity: 0;
    font-size: 12px;
    transition: 0.2s;
}

/* Hover mới hiện */
.entry-item:hover button {
    opacity: 1;
}
    </style>
</head>

<body>

    <div id="loader"></div>
    <div id="loading-text"
        style="text-align: center; font-size: 0.9rem; color: #666; height: 20px; margin-bottom: 10px;"></div>

    <!-- ================= AUTH SCREEN ================= -->
    <div id="auth-screen" class="card">
        <h2>🔐 Đăng nhập / Đăng ký</h2>
        <input type="email" id="email" placeholder="Email của em..." />
        <input type="password" id="password" placeholder="Mật khẩu bí mật..." />

        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
            <button onclick="handleLogin()">Đăng nhập</button>
            <button onclick="handleRegister()" style="background: #ffc8dd;">Đăng ký</button>
        </div>
        <p id="auth-error" style="color: red; font-size: 0.9rem;"></p>
    </div>

    <!-- ================= APP SCREEN ================= -->
    <div id="app-screen" class="hidden">

        <div
            style="display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto;">
            <h3>👋 Xin chào, <span id="user-email"></span>!</h3>
            <button onclick="handleLogout()" style="background: #ffb7b2; font-size: 0.8rem; padding: 5px 10px;">Đăng
                xuất</button>
        </div>

        <!-- 1. EMOTION LOGGING -->
        <div class="card">
            <h2>📅 Ghi lại cảm xúc hôm nay</h2>

            <input type="date" id="date-picker" />

            <div class="emotions-grid">
                <div class="emoji-btn" onclick="selectEmotion(this, '😊', 'Vui vẻ')">😊</div>
                <div class="emoji-btn" onclick="selectEmotion(this, '😢', 'Buồn')">😢</div>
                <div class="emoji-btn" onclick="selectEmotion(this, '😡', 'Tức giận')">😡</div>
                <div class="emoji-btn" onclick="selectEmotion(this, '😰', 'Lo lắng')">😰</div>
                <div class="emoji-btn" onclick="selectEmotion(this, '🤩', 'Hào hứng')">🤩</div>
            </div>
            <p>Cảm xúc: <strong id="selected-emotion-text">...</strong></p>

            <div class="range-wrap">
                <label>Mức độ cảm xúc (1 - 5): <span id="intensity-val">3</span></label>
                <input type="range" id="intensity" min="1" max="5" value="3"
                    oninput="document.getElementById('intensity-val').innerText = this.value" />
            </div>

            <textarea id="daily-note" rows="4" placeholder="Hôm nay có chuyện gì làm em vui/buồn không? Ghi lại nhé..."
                style="width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit;"></textarea>

            <label>📸 Ảnh kỷ niệm (nếu có):</label>
            <input type="file" id="image-file" accept="image/*" />

            <button onclick="saveEntry()" style="width: 100%; margin-top: 10px;">💾 Lưu Nhật Ký</button>
        </div>

        <!-- 2. TOOLBOX (BREATHING) -->
        <div class="card">
            <h2>🧘 Hộp Thở (Box Breathing)</h2>
            <p>Hít vào (4s) - Nín thở (4s) - Thở ra (4s) - Nín thở (4s)</p>

            <div id="breathing-circle">Sẵn sàng</div>
            <div id="timer-display"></div>

            <button onclick="startBreathing()">▶ Bắt đầu</button>
            <button onclick="stopBreathing()" style="background: #ffb7b2;">⏹ Dừng</button>
        </div>

        <!-- 3. CALENDAR HISTORY -->
        <div class="card">
            <h2>📆 Lịch sử cảm xúc của em</h2>
            <div id="calendar-grid">
                <!-- Grid generated by JS -->
            </div>
        </div>

    </div>

    <!-- FIREBASE SDKs (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        /* ========= CONFIG ========= */
        const firebaseConfig = {
            apiKey: "AIzaSyB2B5KUp4_1ENnXttgwOyQFppVvsLLyxvU",
            authDomain: "emotion-diary-ac8ef.firebaseapp.com",
            projectId: "emotion-diary-ac8ef",
            storageBucket: "emotion-diary-ac8ef.firebasestorage.app",
            messagingSenderId: "343844599856",
            appId: "1:343844599856:web:a4e607aa7ef484b8e495f5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const storage = getStorage();

        let currentUser = null;
        let selectedEmojiChar = "";
        let selectedEmojiLabel = "";

        // DOM Elements
        const authScreen = document.getElementById("auth-screen");
        const appScreen = document.getElementById("app-screen");
        const loader = document.getElementById("loader");

        // AUTH LISTENER
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                authScreen.classList.add("hidden");
                appScreen.classList.remove("hidden");
                document.getElementById("user-email").innerText = user.email.split('@')[0];
                loadEntries(); // Load data on login
            } else {
                authScreen.classList.remove("hidden");
                appScreen.classList.add("hidden");
            }
        });

        // --- GLOBAL FUNCTIONS EXPOSED TO WINDOW FOR HTML ONCLICK ---
        window.handleRegister = async () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("Đăng ký thành công! 🎉");
            } catch (error) {
                document.getElementById("auth-error").innerText = error.message;
            }
        };

        window.handleLogin = async () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                document.getElementById("auth-error").innerText = "Lỗi đăng nhập: " + error.message;
            }
        };

        window.handleLogout = () => signOut(auth);

        // --- EMOTION LOGIC ---
        // Set default date to today
        document.getElementById("date-picker").valueAsDate = new Date();

        window.selectEmotion = (el, char, label) => {
            document.querySelectorAll(".emoji-btn").forEach(b => b.classList.remove("selected"));
            el.classList.add("selected");
            selectedEmojiChar = char;
            selectedEmojiLabel = label;
            document.getElementById("selected-emotion-text").innerText = `${char} - ${label}`;
        };

        window.saveEntry = async () => {
            if (!currentUser) return alert("Bạn cần đăng nhập để lưu nhật ký!");
            if (!selectedEmojiChar) return alert("Em ơi, hãy chọn một cảm xúc nhé! 😊");

            loader.style.display = "block";
            const dateVal = document.getElementById("date-picker").value;
            const intensity = document.getElementById("intensity").value;
            const note = document.getElementById("daily-note").value; // Get note
            const file = document.getElementById("image-file").files[0];
            let imageUrl = "";

            try {
                // 1. Upload Image if exists
                if (file) {
                    const storageRef = ref(storage, `images/${currentUser.uid}/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(storageRef);
                }

                // 2. Save to Firestore
                const entryData = {
                    uid: currentUser.uid,
                    date: dateVal,
                    emotion: selectedEmojiChar,
                    label: selectedEmojiLabel,
                    intensity: intensity,
                    note: note, // Save note
                    imageUrl: imageUrl,
                    timestamp: new Date()
                };

                console.log("Saving entry:", entryData); // Log data for debugging

                await addDoc(collection(db, "entries"), entryData);

                alert("Đã lưu nhật ký thành công! 🌟");
                // Reset form
                document.getElementById("image-file").value = "";
                document.getElementById("daily-note").value = "";
                loadEntries(); // Refresh calendar

            } catch (e) {
                console.error("Save Error:", e);
                alert("Có lỗi xảy ra khi lưu: " + e.message + "\n(Vui lòng kiểm tra Console để biết thêm chi tiết)");
            } finally {
                loader.style.display = "none";
            }
        };

        // ================= CALENDAR LOGIC =================

// 🔥 DELETE ENTRY (đặt global để button gọi được)
async function deleteEntry(id) {
    if (!confirm("Xóa cảm xúc này?")) return;

    await deleteDoc(doc(db, "entries", id));
    loadEntries();
}

// 🔥 LOAD ALL ENTRIES
async function loadEntries() {
    if (!currentUser) return;

    const q = query(
        collection(db, "entries"),
        where("uid", "==", currentUser.uid),
        orderBy("timestamp", "desc")
    );

    const snapshot = await getDocs(q);

    const entries = {};

    snapshot.forEach(d => {
        const data = d.data();

        if (!entries[data.date]) {
            entries[data.date] = [];
        }

        entries[data.date].push({
            id: d.id,
            ...data
        });
    });

    renderCalendar(entries);
}

// 🔥 RENDER CALENDAR
function renderCalendar(entries) {

    const grid = document.getElementById("calendar-grid");
    grid.innerHTML = "";

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 1; i <= daysInMonth; i++) {

        const dateObj = new Date(year, month, i);

        const yyyy = dateObj.getFullYear();
        const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        const dd = String(dateObj.getDate()).padStart(2, '0');

        const dateKey = `${yyyy}-${mm}-${dd}`;

        const cell = document.createElement("div");
        cell.className = "day-cell";

        const num = document.createElement("div");
        num.innerText = i;
        cell.appendChild(num);

        const dayEntries = entries[dateKey];

        if (dayEntries && dayEntries.length > 0) {

            cell.style.background = "#fff0f3";
            cell.style.border = "1px solid #ffccd5";

            dayEntries.forEach(e => {

                const item = document.createElement("div");
item.className = "entry-item";

                item.style.fontSize = "0.75rem";
                item.style.marginTop = "4px";
                item.style.padding = "4px";
                item.style.background = "white";
                item.style.borderRadius = "6px";
                item.style.position = "relative";

                item.innerHTML = `
                    <span>${e.emotion}</span>
                    <small>Mức ${e.intensity}</small>
                    <div>${e.note || ""}</div>
                `;

                // delete button
                const delBtn = document.createElement("button");
                delBtn.innerText = "❌";
                delBtn.style.position = "absolute";
                delBtn.style.top = "2px";
                delBtn.style.right = "2px";
                delBtn.style.background = "transparent";

                delBtn.onclick = () => deleteEntry(e.id);

                item.appendChild(delBtn);

                cell.appendChild(item);

                if (e.imageUrl) {
                    const img = document.createElement("img");
                    img.src = e.imageUrl;
                    cell.appendChild(img);
                }
            });

        } else {
            cell.style.background = "#f8f9fa";
            cell.style.opacity = "0.7";
        }

        grid.appendChild(cell);
    }
}

        // --- BREATHING TOOL LOGIC ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let breathInterval = null;
        let isBreathing = false;

        window.startBreathing = () => {
            if (isBreathing) return;
            isBreathing = true;

            // Resume Audio Context on User Click
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const circle = document.getElementById("breathing-circle");
            const timerDisplay = document.getElementById("timer-display");

            // 4 phases: Inhale -> Hold -> Exhale -> Hold
            const phases = [
                { name: "Hít vào... 🌿", cls: "inhale" },
                { name: "Giữ hơi... 😐", cls: "hold" },
                { name: "Thở ra... 💨", cls: "exhale" },
                { name: "Giữ rỗng... ☁️", cls: "hold-empty" }
            ];

            let phaseIndex = 0;
            let timeLeft = 4;

            // Initial state (Start of Phase 1)
            updatePhaseUI(phaseIndex);

            // Start the loop
            breathInterval = setInterval(() => {
                timeLeft--;

                if (timeLeft > 0) {
                    // Countdown: 3, 2, 1
                    timerDisplay.innerText = timeLeft;
                    beep(440, 0.1); // Low beep for countdown
                } else {
                    // Time is 0 -> Switch Phase
                    phaseIndex = (phaseIndex + 1) % 4;
                    timeLeft = 4; // Reset to 4s
                    updatePhaseUI(phaseIndex);
                }
            }, 1000);

            // Function to update UI and play start sound
            function updatePhaseUI(index) {
                const p = phases[index];
                circle.className = p.cls;
                circle.innerText = p.name;
                timerDisplay.innerText = 4;
                beep(880, 0.2); // High beep for new phase start
            }
        };

        window.stopBreathing = () => {
            clearInterval(breathInterval);
            isBreathing = false;

            const circle = document.getElementById("breathing-circle");
            circle.className = "";
            circle.innerText = "Sẵn sàng";
            document.getElementById("timer-display").innerText = "";
        };

        function beep(freq = 440, duration = 0.1) {
            if (!isBreathing) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = "sine";
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            // Volume Envelope
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);
        }
    </script>

</body>
