<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Emotion Journal</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <style>
        body {
            font-family: system-ui;
            background: #eef7f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #7cc7b6;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        button:hover {
            background: #65b7a4;
        }

        .emotions {
            display: flex;
            justify-content: space-between;
        }

        .emotions button {
            width: 18%;
            font-size: 22px;
            background: #d9f1ec;
            color: #333;
        }

        .square {
            width: 160px;
            height: 160px;
            background: #b8e4d9;
            border-radius: 16px;
            margin: auto;
            transition: all 4s linear;
        }

        .expand {
            transform: scale(1.3);
        }

        .timer {
            font-size: 44px;
            text-align: center;
            margin: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- LOGIN -->
        <div class="card">
            <h2>👤 Đăng nhập</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Mật khẩu">
            <button id="registerBtn">Đăng ký</button>
            <button id="loginBtn">Đăng nhập</button>
            <button id="logoutBtn">Đăng xuất</button>
        </div>

        <!-- CHECK IN -->
        <div class="card">
            <h2>😊 Check-in cảm xúc</h2>

            <div class="emotions">
                <button data-e="sad">😢</button>
                <button data-e="happy">😊</button>
                <button data-e="excited">🤩</button>
                <button data-e="angry">😡</button>
                <button data-e="neutral">😐</button>
            </div>

            <input type="range" id="intensity" min="1" max="10">

            <input type="date" id="date">

            <textarea id="note" placeholder="Ghi chú..."></textarea>

            <input type="file" id="photo">

            <button id="saveBtn">💾 Lưu</button>
        </div>

        <!-- BREATHING -->
        <div class="card">
            <h2>🫁 Thở hình vuông</h2>

            <div class="square" id="box"></div>

            <div class="timer" id="timer">4</div>

            <button id="startBtn">▶ Bắt đầu</button>
            <button id="stopBtn">■ Dừng</button>
        </div>

    </div>

    <script defer src="app.js"></script>
</body>

</html>
